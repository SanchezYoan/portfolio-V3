stages:
  - lint

variables:
  APP_IMAGE: "$CI_REGISTRY_IMAGE/app"
  NGINX_IMAGE: "$CI_REGISTRY_IMAGE/nginx"

lint:php:
  stage: lint
  image: php:8.3-cli
  script:
    - find src templates -name "*.php" | xargs -r php -l
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
