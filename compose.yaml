services:

  app:
    build:
      context: .
      target: app
    volumes:
      - .:/var/www/symfony
    environment:
      APP_ENV: ${APP_ENV}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      database:
        condition: service_healthy

  nginx:
    build:
      context: .
      target: nginx
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/symfony/public:ro
    depends_on:
      - app


  database:
    image: mariadb:10.11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_USER: app
      MARIADB_PASSWORD: app
      MARIADB_DATABASE: portfolio_db

    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
      start_period: 20s

    volumes:
      - database_data:/var/lib/mysql:rw

volumes:
  database_data:
