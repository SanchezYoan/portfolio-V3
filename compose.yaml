services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"  # accès via http://localhost:8080
    volumes:
      - .:/var/www/symfony
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  app:
    build:
      context: .           # racine du projet
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www/symfony
    environment:
      APP_ENV: dev
      DATABASE_URL: mysql://root:root@database:3306/portfolio_db?serverVersion=12.2.2-MariaDB&charset=utf8mb4
    depends_on:
      database:
        condition: service_healthy

  database:
    image: mariadb:10.11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: portfolio_db
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/mysql:rw

volumes:
  database_data: